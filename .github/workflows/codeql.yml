name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    # CodeQL (code scanning) es gratis en repos publicos; en privados exige GitHub
    # Advanced Security. Mientras el repo sea privado el job se omite (no falla el
    # CI) y se activa solo al hacerlo publico.
    if: ${{ github.event.repository.private == false }}
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4

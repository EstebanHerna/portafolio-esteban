name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://esteban-hernandez.vercel.app

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Se corre el binario directamente (no la Action) para que funcione igual en
      # push y en PRs de Dependabot, cuyo token es de solo lectura y hace fallar a
      # gitleaks-action al intentar escribir comentarios/checks via API.
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --redact --no-banner
